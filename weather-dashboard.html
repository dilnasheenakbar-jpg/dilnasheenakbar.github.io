<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .search-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .search-box {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      width: 300px;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      outline: none;
      transition: transform 0.2s;
    }

    .search-box:focus {
      transform: scale(1.02);
    }

    .search-btn {
      padding: 12px 30px;
      background: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      color: #667eea;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .search-btn:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }

    .current-weather {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .city-name {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 10px;
    }

    .date-time {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .temp-display {
      font-size: 4rem;
      color: #667eea;
      font-weight: bold;
      margin: 20px 0;
    }

    .weather-description {
      font-size: 1.3rem;
      color: #666;
      text-transform: capitalize;
      margin-bottom: 20px;
    }

    .weather-icon {
      font-size: 5rem;
      margin: 20px 0;
    }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .detail-card {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .detail-label {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 1.5rem;
      color: #333;
      font-weight: 600;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .forecast-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .forecast-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .forecast-day {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .forecast-icon {
      font-size: 2.5rem;
      margin: 10px 0;
    }

    .forecast-temp {
      font-size: 1.2rem;
      color: #667eea;
      font-weight: 600;
    }

    .forecast-desc {
      font-size: 0.85rem;
      color: #888;
      text-transform: capitalize;
      margin-top: 5px;
    }

    .error {
      background: #ff6b6b;
      color: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin: 20px 0;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 1.2rem;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .forecast-section {
      margin-top: 40px;
    }

    .section-title {
      color: white;
      font-size: 1.8rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .search-box {
        width: 100%;
      }

      .temp-display {
        font-size: 3rem;
      }

      .city-name {
        font-size: 1.8rem;
      }

      .current-weather {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌤️ Weather Dashboard</h1>
      <p>Real-time weather information for any city</p>
    </div>

    <div class="search-container">
      <input type="text" id="searchInput" class="search-box" placeholder="Enter city name..." />
      <button class="search-btn" onclick="searchWeather()">Search</button>
    </div>

    <div id="errorContainer"></div>
    <div id="loadingContainer"></div>

    <div id="weatherContainer"></div>
    <div id="forecastContainer" class="forecast-section"></div>
  </div>

  <script>
    const API_KEY = '4d8fb5b93d4af21d66a2948710284366'; // Open Weather Map API Key
    const API_URL = 'https://api.openweathermap.org/data/2.5';

    function showLoading() {
      document.getElementById('loadingContainer').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          Loading weather data...
        </div>
      `;
    }

    function hideLoading() {
      document.getElementById('loadingContainer').innerHTML = '';
    }

    function showError(message) {
      document.getElementById('errorContainer').innerHTML = `
        <div class="error">⚠️ ${message}</div>
      `;
    }

    function hideError() {
      document.getElementById('errorContainer').innerHTML = '';
    }

    function getWeatherIcon(code) {
      const iconMap = {
        '01d': '☀️', '01n': '🌙',
        '02d': '⛅', '02n': '🌤️',
        '03d': '☁️', '03n': '☁️',
        '04d': '☁️', '04n': '☁️',
        '09d': '🌧️', '09n': '🌧️',
        '10d': '🌦️', '10n': '🌧️',
        '11d': '⛈️', '11n': '⛈️',
        '13d': '❄️', '13n': '❄️',
        '50d': '🌫️', '50n': '🌫️'
      };
      return iconMap[code] || '🌡️';
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    async function getWeather(city) {
      showLoading();
      hideError();

      try {
        // Fetch current weather
        const weatherResponse = await fetch(
          `${API_URL}/weather?q=${city}&appid=${API_KEY}&units=metric`
        );

        if (!weatherResponse.ok) {
          throw new Error('City not found');
        }

        const weatherData = await weatherResponse.json();

        // Fetch forecast
        const forecastResponse = await fetch(
          `${API_URL}/forecast?q=${city}&appid=${API_KEY}&units=metric`
        );
        const forecastData = await forecastResponse.json();

        hideLoading();
        displayWeather(weatherData);
        displayForecast(forecastData);
      } catch (error) {
        hideLoading();
        showError(error.message || 'Failed to fetch weather data');
        document.getElementById('weatherContainer').innerHTML = '';
        document.getElementById('forecastContainer').innerHTML = '';
      }
    }

    function displayWeather(data) {
      const { main, weather, wind, clouds, sys, name, coord, dt } = data;

      const html = `
        <div class="current-weather">
          <div class="city-name">${name}, ${data.sys.country}</div>
          <div class="date-time">${formatDate(dt)}</div>
          <div class="weather-icon">${getWeatherIcon(weather[0].icon)}</div>
          <div class="temp-display">${Math.round(main.temp)}°C</div>
          <div class="weather-description">${weather[0].description}</div>
          
          <div class="weather-details">
            <div class="detail-card">
              <div class="detail-label">Feels Like</div>
              <div class="detail-value">${Math.round(main.feels_like)}°C</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Humidity</div>
              <div class="detail-value">${main.humidity}%</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Pressure</div>
              <div class="detail-value">${main.pressure} mb</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value">${wind.speed} m/s</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Clouds</div>
              <div class="detail-value">${clouds.all}%</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Visibility</div>
              <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('weatherContainer').innerHTML = html;
    }

    function displayForecast(data) {
      const forecastByDay = {};

      data.list.forEach((item) => {
        const date = formatDate(item.dt);
        if (!forecastByDay[date]) {
          forecastByDay[date] = [];
        }
        forecastByDay[date].push(item);
      });

      let forecastHTML = '<h2 class="section-title">5-Day Forecast</h2><div class="forecast">';

      let dayCount = 0;
      for (const day in forecastByDay) {
        if (dayCount >= 5) break;
        
        const dayForecasts = forecastByDay[day];
        const noonForecast = dayForecasts[Math.floor(dayForecasts.length / 2)];

        forecastHTML += `
          <div class="forecast-card">
            <div class="forecast-day">${day}</div>
            <div class="forecast-icon">${getWeatherIcon(noonForecast.weather[0].icon)}</div>
            <div class="forecast-temp">${Math.round(noonForecast.main.temp)}°C</div>
            <div class="forecast-desc">${noonForecast.weather[0].description}</div>
          </div>
        `;
        dayCount++;
      }

      forecastHTML += '</div>';
      document.getElementById('forecastContainer').innerHTML = forecastHTML;
    }

    function searchWeather() {
      const city = document.getElementById('searchInput').value.trim();
      if (!city) {
        showError('Please enter a city name');
        return;
      }
      getWeather(city);
    }

    // Allow Enter key to search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchWeather();
      }
    });

    // Load default city on page load
    window.addEventListener('load', () => {
      getWeather('New York');
    });
  </script>
</body>
</html>
